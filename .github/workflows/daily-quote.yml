name: Daily Quote Update
on:
  schedule:
    # Runs every day at 6:00 AM Philippine time
    - cron: '0 22 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub

permissions:
  contents: write  # ← Add this! Gives permission to write/push

jobs:
  update-quote:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # ← Updated from v3
      
      - name: Set up Python
        uses: actions/setup-python@v5  # ← Updated from v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run quote update script
        run: python update_quote.py
      
      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      
      - name: Commit and push
        run: |
          git add quotes.md
          git diff-index --quiet HEAD || git commit -m "Daily quote: $(date +'%Y-%m-%d')"
          git push
