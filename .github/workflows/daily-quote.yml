name: Daily Quote Update
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-quote:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}  # ← Add this
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run quote update script
        run: python update_quote.py
      
      - name: Configure Git
        run: |
          git config --local user.email "akshe17@users.noreply.github.com"
          git config --local user.name "akshe17"
      
      - name: Commit and push
        run: |
          git add quotes.md
          git diff-index --quiet HEAD || git commit -m "Daily quote: $(date +'%Y-%m-%d')"
          git push origin main
